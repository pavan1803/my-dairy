<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>My Diary — Don't Give Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #fffdf6;
    --paper-line: #ede5d8;
    --spine: #2d1a08;
    --spine-accent: #b85c2c;
    --spine-dark: #7a3b10;
    --ink: #1e1208;
    --ink-muted: #7a5a3a;
    --ink-faint: #c4a882;
    --gold: #c49a5a;
    --gold-light: #f5ddb8;
    --footer-bg: #f0e4d2;
    --toast-green: #2f5c0e;
    --del-red: #a03030;
    --line-h: 32px;
    --f: 'Inter', sans-serif;
  }

  html, body { height: 100%; }

  body {
    min-height: 100vh;
    background: #18100a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.5rem 0.75rem 2.5rem;
    font-family: var(--f);
    -webkit-font-smoothing: antialiased;
  }

  .tagline {
    font-size: 12px;
    color: rgba(196,154,90,0.7);
    letter-spacing: 0.5px;
    margin-bottom: 1.2rem;
    text-align: center;
    font-style: italic;
  }

  /* book */
  .book {
    width: 100%;
    max-width: 540px;
    background: var(--paper);
    border-radius: 3px 12px 12px 3px;
    box-shadow:
      -7px 0 0 0 var(--spine-accent),
      -8px 0 2px 0 var(--spine-dark),
      0 16px 48px rgba(0,0,0,0.6),
      0 4px 10px rgba(0,0,0,0.35);
    overflow: hidden;
    animation: rise 0.4s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* header */
  .book-header {
    background: var(--spine);
    padding: 1rem 1.2rem 1rem 1.4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--spine-accent);
    gap: 12px;
  }

  .book-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: -0.3px;
    line-height: 1.1;
  }

  .book-sub {
    font-size: 10px;
    color: var(--gold);
    margin-top: 3px;
    font-style: italic;
  }

  .header-date-block { text-align: right; flex-shrink: 0; }

  .header-day {
    font-size: 11px;
    color: var(--gold);
    font-weight: 500;
    line-height: 1.3;
  }

  .header-date-num {
    font-size: 28px;
    font-weight: 600;
    color: var(--gold-light);
    line-height: 1;
  }

  .header-month-year {
    font-size: 11px;
    color: var(--gold);
    font-style: italic;
  }

  /* page */
  .page-area {
    padding: 1rem 1.2rem 1rem 1.4rem;
    background: var(--paper);
    background-image: repeating-linear-gradient(
      transparent,
      transparent calc(var(--line-h) - 1px),
      var(--paper-line) calc(var(--line-h) - 1px),
      var(--paper-line) var(--line-h)
    );
    background-position: 0 54px;
    min-height: 340px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .page-date-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-bottom: 4px;
  }

  .page-date-full {
    font-size: 15px;
    font-weight: 600;
    color: var(--spine-dark);
    line-height: 1.3;
    flex: 1;
    min-width: 0;
  }

  .page-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .page-num {
    font-size: 10.5px;
    color: var(--ink-faint);
    font-style: italic;
    white-space: nowrap;
  }

  .del-btn {
    background: none;
    border: none;
    font-family: var(--f);
    font-style: italic;
    font-size: 10px;
    color: #c4a882;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .del-btn:hover, .del-btn:active { color: var(--del-red); }

  .quote-strip {
    font-size: 11.5px;
    font-style: italic;
    color: var(--ink-muted);
    border-left: 2px solid var(--gold);
    padding: 4px 0 4px 10px;
    line-height: 1.6;
    background: rgba(196,154,90,0.07);
    border-radius: 0 4px 4px 0;
  }

  .entry-label {
    font-size: 10.5px;
    color: var(--ink-muted);
    font-style: italic;
    margin-top: 2px;
  }

  textarea {
    width: 100%;
    flex: 1;
    min-height: 200px;
    border: none;
    background: transparent;
    resize: none;
    font-family: var(--f);
    font-size: 15px;
    color: var(--ink);
    line-height: var(--line-h);
    outline: none;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
  }

  textarea::placeholder {
    color: var(--ink-faint);
    font-style: italic;
    font-size: 13.5px;
  }

  /* date jump */
  .date-nav-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 1.2rem 7px 1.4rem;
    background: #f5ede0;
    border-top: 0.5px solid #ddd0bc;
  }

  .date-nav-row label {
    font-size: 11px;
    color: var(--ink-muted);
    font-style: italic;
    white-space: nowrap;
  }

  input[type="date"] {
    flex: 1;
    min-width: 0;
    border: 0.5px solid #c4a882;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--f);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 20px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="date"]:focus { border-color: var(--spine-dark); }

  .jump-btn {
    background: var(--spine-dark);
    border: none;
    color: var(--gold-light);
    font-family: var(--f);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .jump-btn:active { background: var(--spine-accent); }

  /* footer */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.65rem 1.2rem 0.8rem 1.4rem;
    background: var(--footer-bg);
    border-top: 0.5px solid #ddd0bc;
    gap: 6px;
  }

  .nav-btn {
    background: transparent;
    border: 0.5px solid var(--gold);
    color: var(--spine-dark);
    padding: 8px 14px;
    border-radius: 20px;
    font-family: var(--f);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    min-width: 72px;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: #e8d8c0; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; background: transparent; }

  .center-btns { display: flex; gap: 7px; align-items: center; }

  .save-btn {
    background: var(--spine-dark);
    border: none;
    color: var(--gold-light);
    padding: 8px 18px;
    border-radius: 20px;
    font-family: var(--f);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { background: var(--spine-accent); }

  .new-btn {
    background: transparent;
    border: 0.5px solid var(--gold);
    color: var(--spine-dark);
    padding: 8px 12px;
    border-radius: 20px;
    font-family: var(--f);
    font-size: 13px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .new-btn:active { background: #e8d8c0; }

  .saved-toast {
    font-size: 11px;
    color: var(--toast-green);
    font-style: italic;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .saved-toast.show { opacity: 1; }

  .watermark {
    margin-top: 1rem;
    font-size: 11px;
    color: rgba(196,154,90,0.4);
    text-align: center;
    font-style: italic;
  }

  /* mobile */
  @media (max-width: 420px) {
    body { padding: 0.8rem 0 2rem; }

    .book {
      border-radius: 0;
      box-shadow:
        -5px 0 0 0 var(--spine-accent),
        -6px 0 2px 0 var(--spine-dark),
        0 8px 24px rgba(0,0,0,0.5);
    }

    .book-header { padding: 0.85rem 1rem 0.85rem 1.1rem; }
    .book-title { font-size: 20px; }
    .header-date-num { font-size: 24px; }

    .page-area {
      padding: 0.9rem 1rem 0.9rem 1.1rem;
      min-height: 280px;
    }

    .page-date-full { font-size: 13px; }

    textarea {
      font-size: 15px;
      min-height: 160px;
    }

    .date-nav-row { padding: 6px 1rem 6px 1.1rem; }

    .footer-row {
      padding: 0.6rem 1rem 0.75rem 1.1rem;
      gap: 4px;
    }

    .nav-btn { padding: 9px 10px; font-size: 12px; min-width: 62px; }
    .save-btn { padding: 9px 14px; font-size: 12px; }
    .new-btn  { padding: 9px 10px; font-size: 12px; }
    .tagline  { font-size: 11px; margin-bottom: 0.7rem; }
    .watermark { display: none; }
  }
</style>
</head>
<body>

<p class="tagline">lose a little, learn a lot &mdash; don't you dare give up</p>

<div class="book">
  <div class="book-header">
    <div>
      <div class="book-title">My Diary</div>
      <div class="book-sub">Jack Of All, Master Of None</div>
    </div>
    <div class="header-date-block" id="header-date-block"></div>
  </div>

  <div class="page-area">
    <div class="page-date-row">
      <div class="page-date-full" id="page-date-full"></div>
      <div class="page-info">
        <span class="page-num" id="page-num"></span>
        <button class="del-btn" onclick="deletePage()">delete page</button>
      </div>
    </div>
    <div class="quote-strip" id="quote-strip"></div>
    <div class="entry-label">What The Fuck did you achieve today!!</div>
    <textarea id="entry-text" placeholder="Still the same routine?,Still a Failure,It's ok,good to lose.Eyes will talk,mind will struggle and heart gives u less hope, but be strong,when everythins fails,the hero will rise.U are lone warrior, never forget that..."></textarea>
  </div>

  <div class="date-nav-row">
    <label for="date-picker">Jump to:</label>
    <input type="date" id="date-picker" />
    <button class="jump-btn" onclick="jumpToDate()">Go</button>
  </div>

  <div class="footer-row">
    <button class="nav-btn" id="prev-btn" onclick="goPage(-1)">&#8592; Prev</button>
    <div class="center-btns">
      <span class="saved-toast" id="saved-toast">Saved ✓</span>
      <button class="save-btn" onclick="savePage()">Save</button>
      <button class="new-btn" onclick="newPage()">+ New</button>
    </div>
    <button class="nav-btn" id="next-btn" onclick="goPage(1)">Next &#8594;</button>
  </div>
</div>

<p class="watermark">your words, your story &mdash; saved right here</p>

<script>
  const quotes = [
    "Every day you didn't quit is a win. Even today.",
    "You don't have to be great to start, but you have to start to be great.",
    "Losing is just winning with a longer timeline.",
    "The page is blank — fill it. That's the only rule.",
    "You've survived 100% of your hardest days. Keep going.",
    "It's okay to fall. The diary doesn't judge. Come back tomorrow.",
    "Progress lives in the small moments nobody else sees.",
    "One word. One step. One day. That's enough.",
    "You are not behind. You are exactly where you need to begin.",
    "Failing teaches what success never could.",
    "The fact you're writing means you haven't given up.",
    "Each entry is proof you kept going.",
    "Don't wait for perfect. Write the messy version.",
    "Losing ground today just means more to reclaim tomorrow.",
    "Your story is still being written. Don't close the book.",
    "Some days you lose. That's how you learn what matters.",
    "The comeback is always stronger than the setback.",
    "Rest if you must, but don't quit.",
    "Small progress is still progress. Write it down.",
    "You showed up. That already makes today worth something.",
  ];

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function fFull(ds)      { return new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  function fDay(ds)       { return new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long'}); }
  function fDayNum(ds)    { return new Date(ds+'T00:00:00').getDate(); }
  function fMonthYear(ds) { return new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{month:'long',year:'numeric'}); }

  function loadPages() { try { return JSON.parse(localStorage.getItem('my_diary_pages')||'[]'); } catch { return []; } }
  function savePages(p) { localStorage.setItem('my_diary_pages', JSON.stringify(p)); }

  let pages = loadPages(), idx = 0;

  function getOrCreatePage(ds) {
    let i = pages.findIndex(p => p.date === ds);
    if (i === -1) {
      pages.push({ date: ds, text: '', quote: quotes[Math.floor(Math.random()*quotes.length)] });
      pages.sort((a,b) => a.date.localeCompare(b.date));
      savePages(pages);
      i = pages.findIndex(p => p.date === ds);
    }
    return i;
  }

  function renderPage() {
    if (!pages.length) idx = getOrCreatePage(todayStr());
    idx = Math.max(0, Math.min(idx, pages.length-1));
    const p = pages[idx];

    document.getElementById('header-date-block').innerHTML =
      `<div class="header-day">${fDay(p.date)}</div>
       <div class="header-date-num">${fDayNum(p.date)}</div>
       <div class="header-month-year">${fMonthYear(p.date)}</div>`;

    document.getElementById('page-date-full').textContent  = fFull(p.date);
    document.getElementById('page-num').textContent        = 'Page '+(idx+1)+' of '+pages.length;
    document.getElementById('quote-strip').textContent     = p.quote || quotes[0];
    document.getElementById('entry-text').value            = p.text  || '';
    document.getElementById('date-picker').value           = p.date;
    document.getElementById('prev-btn').disabled = idx === 0;
    document.getElementById('next-btn').disabled = idx === pages.length-1;
  }

  function savePage() {
    pages[idx].text = document.getElementById('entry-text').value;
    savePages(pages);
    const t = document.getElementById('saved-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function goPage(dir)  { savePage(); idx += dir; renderPage(); }
  function newPage()    { savePage(); idx = getOrCreatePage(todayStr()); renderPage(); }

  function jumpToDate() {
    const val = document.getElementById('date-picker').value;
    if (!val) return;
    savePage();
    idx = getOrCreatePage(val);
    renderPage();
  }

  function deletePage() {
    if (!confirm('Delete this page forever?')) return;
    if (pages.length === 1) { pages[0].text=''; savePages(pages); renderPage(); return; }
    pages.splice(idx, 1);
    savePages(pages);
    idx = Math.max(0, idx-1);
    renderPage();
  }

  idx = pages.length
    ? (pages.findIndex(p=>p.date===todayStr()) !== -1 ? pages.findIndex(p=>p.date===todayStr()) : pages.length-1)
    : getOrCreatePage(todayStr());

  renderPage();

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); savePage(); }
  });
</script>
</body>
</html>
